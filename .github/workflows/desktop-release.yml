# Build Tauri desktop app for Windows, macOS (Intel + Apple Silicon), and Linux.
# Uploads installers + update bundles to GitHub Release and generates latest.json for auto-update.
#
# Trigger: push a tag matching v* (e.g. git tag v1.1.0 && git push origin v1.1.0)
# The workflow creates the Release for that tag, builds on all 3 OS, then generates latest.json
# so the desktop app can auto-update on all platforms.
#
# Build time: First run ~15–18 min (Windows), ~10 min (Linux), ~4–5 min (macOS). Later runs faster
# with rust-cache + sccache. Frontend is built once inside `tauri build` (beforeBuildCommand);
# do not add a separate npm run build.
#
# Required for auto-updates: GitHub secrets TAURI_PRIVATE_KEY + TAURI_KEY_PASSWORD (minisign private key
# and optional password). The workflow exports both legacy names and Tauri 2 names (TAURI_SIGNING_*).
# Without the private key, .sig files are not produced and latest.json will have empty platforms.
#
# Set VITE_GITHUB_RELEASES_URL in repo or env so /download page links work.

name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os_name: windows
          # macOS 13 runner deprecated; use macos-14 (ARM). For Intel use macos-14-large (larger runner).
          - platform: macos-14
            os_name: macos
            macos_arch: aarch64
          - platform: ubuntu-22.04
            os_name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag (align installer filename with release)
        run: node scripts/set-version-from-tag.cjs ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache (Rust compilation cache across runs)
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev libsoup-3.0-dev libsoup2.4-dev libjavascriptcoregtk-4.0-dev libjavascriptcoregtk-4.1-dev
          pkg-config --exists libsoup-2.4 || (echo "libsoup-2.4 not found after install" && pkg-config --list-all | grep -i soup; exit 1)
          pkg-config --exists webkit2gtk-4.0 || (echo "webkit2gtk-4.0 not found" && pkg-config --list-all | grep -i webkit; exit 1)

      - name: Set PKG_CONFIG_PATH for Linux (soup2-sys)
        if: matrix.os_name == 'linux'
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      # Single frontend build: beforeBuildCommand (npm run build) runs inside tauri build; avoid building twice.
      # desktop:build runs generate-desktop-icons first so Windows/macOS/Linux bundle + tray use public/logo.svg.
      - name: Build Tauri app (with updater signing if TAURI_PRIVATE_KEY is set)
        run: npm run desktop:build
        env:
          VITE_API_URL: https://api.bountyhub.tech
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # Discover bundles under any target triple (e.g. target/release vs target/x86_64-.../release).
      - name: Upload Windows artifacts
        if: matrix.os_name == 'windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          upload_args=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && upload_args+=("$line")
          done < <(find src-tauri/target -type f \( \
            -path '*/bundle/nsis/*.exe' -o \
            -path '*/bundle/nsis/*.zip' -o \
            -path '*/bundle/nsis/*.sig' -o \
            -path '*/bundle/msi/*.msi' \
          \) 2>/dev/null | sort -u)
          if [[ ${#upload_args[@]} -eq 0 ]]; then
            echo "::error::No Windows NSIS/MSI artifacts found. Search tree:"
            find src-tauri/target -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.zip' \) 2>/dev/null | head -60 || true
            exit 1
          fi
          echo "Uploading Windows files:"
          printf '  %s\n' "${upload_args[@]}"
          gh release upload "$TAG" "${upload_args[@]}" --repo "$REPO" --clobber

      - name: Upload macOS artifacts
        if: matrix.os_name == 'macos'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          upload_args=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && upload_args+=("$line")
          done < <(find src-tauri/target -type f \( \
            -path '*/bundle/dmg/*.dmg' -o \
            -path '*/bundle/macos/*.tar.gz' -o \
            -path '*/bundle/macos/*.sig' \
          \) 2>/dev/null | sort -u)
          if [[ ${#upload_args[@]} -eq 0 ]]; then
            echo "::error::No macOS bundle artifacts found."
            find src-tauri/target -type f -name '*.dmg' 2>/dev/null | head -40 || true
            exit 1
          fi
          echo "Uploading macOS files:"
          printf '  %s\n' "${upload_args[@]}"
          gh release upload "$TAG" "${upload_args[@]}" --repo "$REPO" --clobber

      - name: Upload Linux artifacts
        if: matrix.os_name == 'linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          upload_args=()
          while IFS= read -r line; do
            [[ -n "$line" ]] && upload_args+=("$line")
          done < <(find src-tauri/target -type f \( \
            -path '*/bundle/appimage/*.AppImage' -o \
            -path '*/bundle/appimage/*.appimage' -o \
            -path '*/bundle/appimage/*.tar.gz' -o \
            -path '*/bundle/appimage/*.sig' -o \
            -path '*/bundle/deb/*.deb' \
          \) 2>/dev/null | sort -u)
          if [[ ${#upload_args[@]} -eq 0 ]]; then
            echo "::error::No Linux bundle artifacts found."
            find src-tauri/target -type f \( -name '*.AppImage' -o -name '*.deb' \) 2>/dev/null | head -40 || true
            exit 1
          fi
          echo "Uploading Linux files:"
          printf '  %s\n' "${upload_args[@]}"
          gh release upload "$TAG" "${upload_args[@]}" --repo "$REPO" --clobber

  update-manifest:
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate latest.json for Tauri updater (all platforms)
        run: |
          node scripts/generate-update-manifest.js "${{ github.ref_name }}" "${{ github.repository }}" --out=latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
