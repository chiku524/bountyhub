# Development configuration for local testing
name = "bountyhub-api-dev"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "functions/index.ts"

# Local development settings
[dev]
port = 8788

[[d1_databases]]
binding = "DB"
database_name = "bountyhub-db-dev"
database_id = "local"
migrations_dir = "drizzle/migrations"

# R2: optional for local; use same bucket name or create dev bucket
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "bountyhub-media"

# KV (preview namespace for local dev)
[[kv_namespaces]]
binding = "CACHE"
preview_id = "27bafcd35c634a5facf96d6fc8b70be0"

# Durable Object for chat WebSockets (same as production)
[[durable_objects.bindings]]
name = "CHAT_ROOM_DO"
class_name = "ChatRoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoomDO"]

# Development environment variables
[vars]
NODE_ENV = "development"
SESSION_SECRET = "dev-secret-key"
SOLANA_RPC_URL = "https://mainnet.helius-rpc.com/?api-key=22e3e8b6-b2a0-4b4d-944a-226099908bd6"
SOLANA_DEVNET_RPC_URL = "https://api.devnet.solana.com"
SOLANA_WALLET_PRIVATE_KEY = "dev-key"
SOLANA_WALLET_ADDRESS = "dev-address"
CLOUDINARY_CLOUD_NAME = "dqobhvk07"
