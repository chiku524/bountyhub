<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="logo-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="logo-gold" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo centered on canvas (64 * 5.625 = 360px wide; 600 - 180 = 420) -->
  <g transform="translate(420, 100) scale(5.625)">
    <rect width="64" height="64" rx="14" fill="url(#logo-bg)"/>
    <path d="M 21 19 L 13 32 L 21 45" fill="none" stroke="url(#logo-accent)" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 43 19 L 51 32 L 43 45" fill="none" stroke="url(#logo-accent)" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 32 18.5 C 25.8 18.5 21.2 23.2 21.2 28.8 C 21.2 32.4 23.6 35.2 27.2 36.1 L 27.2 38.2" fill="none" stroke="#e0e7ff" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="42.2" r="2.5" fill="#e0e7ff"/>
    <circle cx="32" cy="52.5" r="5.8" fill="url(#logo-gold)"/>
    <path d="M 32 48.8 V 56.2 M 28.8 50.8 H 35.2" stroke="#78350f" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  </g>
  <!-- Title + tagline centered under logo (logo bottom ~460) -->
  <text x="600" y="500" fill="white" font-family="system-ui, sans-serif" font-size="68" font-weight="700" text-anchor="middle">bountyhub</text>
  <text x="600" y="555" fill="rgba(255,255,255,0.9)" font-family="system-ui, sans-serif" font-size="26" text-anchor="middle">Decentralized Bounty Platform - Solana</text>
</svg>
