    <!-- Lock -->
    <circle cx="0" cy="1" r="3" fill="#B45309"/>
    <rect x="-1" y="1" width="2" height="4" fill="#B45309" rx="0.5"/>
    <!-- Coins -->
    <circle cx="-8" cy="14" r="4" fill="url(#bh-coin)" stroke="#B45309" stroke-width="0.8"/>
    <circle cx="2" cy="16" r="3" fill="url(#bh-coin)" stroke="#B45309" stroke-width="0.8"/>
    <circle cx="10" cy="12" r="3.5" fill="url(#bh-coin)" stroke="#B45309" stroke-width="0.8"/>
  </g>
