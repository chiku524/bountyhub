<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="120" fill="url(#gradient)" stroke="#FFD700" stroke-width="4"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold gradient for coins -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Treasure Chest -->
  <g transform="translate(128, 128)">
    <!-- Chest Body -->
    <rect x="-40" y="-20" width="80" height="40" rx="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="2"/>
    
    <!-- Chest Lid -->
    <rect x="-42" y="-30" width="84" height="12" rx="6" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="2"/>
    
    <!-- Chest Lock -->
    <circle cx="0" cy="-15" r="6" fill="#B8860B"/>
    <rect x="-2" y="-15" width="4" height="8" fill="#B8860B"/>
    
    <!-- Coins spilling out -->
    <circle cx="-15" cy="15" r="8" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    <circle cx="5" cy="20" r="6" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    <circle cx="20" cy="12" r="7" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="1"/>
    
    <!-- Dollar signs on coins -->
    <text x="-15" y="18" text-anchor="middle" fill="#B8860B" font-family="Arial, sans-serif" font-size="8" font-weight="bold">$</text>
    <text x="5" y="23" text-anchor="middle" fill="#B8860B" font-family="Arial, sans-serif" font-size="6" font-weight="bold">$</text>
    <text x="20" y="16" text-anchor="middle" fill="#B8860B" font-family="Arial, sans-serif" font-size="7" font-weight="bold">$</text>
  </g>
  
  <!-- BBUX Text -->
  <text x="128" y="200" text-anchor="middle" fill="#FFD700" font-family="Arial, sans-serif" font-size="24" font-weight="bold">BBUX</text>
  
  <!-- Sparkles -->
  <g fill="#FFD700">
    <circle cx="50" cy="50" r="2" opacity="0.8"/>
    <circle cx="206" cy="60" r="1.5" opacity="0.6"/>
    <circle cx="70" cy="200" r="1" opacity="0.7"/>
    <circle cx="190" cy="190" r="1.5" opacity="0.8"/>
    <circle cx="40" cy="180" r="1" opacity="0.6"/>
    <circle cx="220" cy="80" r="1" opacity="0.7"/>
  </g>
</svg> 