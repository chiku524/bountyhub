<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="logo-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="logo-gold" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Hub logo (left) -->
  <g transform="translate(120, 125) scale(3.9)">
    <rect width="64" height="64" rx="14" fill="url(#logo-bg)"/>
    <path d="M 21 19 L 13 32 L 21 45" fill="none" stroke="url(#logo-accent)" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 43 19 L 51 32 L 43 45" fill="none" stroke="url(#logo-accent)" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 32 18.5 C 25.8 18.5 21.2 23.2 21.2 28.8 C 21.2 32.4 23.6 35.2 27.2 36.1 L 27.2 38.2" fill="none" stroke="#e0e7ff" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="32" cy="42.2" r="2.5" fill="#e0e7ff"/>
    <circle cx="32" cy="52.5" r="5.8" fill="url(#logo-gold)"/>
    <path d="M 32 48.8 V 56.2 M 28.8 50.8 H 35.2" stroke="#78350f" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  </g>
  <!-- Title + tagline -->
  <text x="420" y="220" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700">bountyhub</text>
  <text x="420" y="280" fill="rgba(255,255,255,0.9)" font-family="system-ui, -apple-system, sans-serif" font-size="22">Decentralized Bounty Platform – Solana</text>
  <text x="420" y="340" fill="#22d3ee" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600">Ask · Answer · Earn</text>
  <!-- Use-case pills -->
  <rect x="420" y="370" width="140" height="36" rx="18" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="490" y="394" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Q&amp;A Bounties</text>
  <rect x="580" y="370" width="160" height="36" rx="18" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="660" y="394" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Bug Bounties</text>
  <rect x="760" y="370" width="120" height="36" rx="18" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="820" y="394" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Developer Hub</text>
</svg>
