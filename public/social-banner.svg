<svg width="1500" height="500" viewBox="0 0 1500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="45%" stop-color="#151b33"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="bnlx-bg" x1="10" y1="4" x2="54" y2="62">
          <stop offset="0%" stop-color="#0b1020"/>
          <stop offset="45%" stop-color="#151b33"/>
          <stop offset="100%" stop-color="#312e81"/>
        </linearGradient>
        <radialGradient id="bnlx-coin" cx="38%" cy="32%" r="68%">
          <stop offset="0%" stop-color="#fffef0"/>
          <stop offset="18%" stop-color="#fde68a"/>
          <stop offset="55%" stop-color="#f59e0b"/>
          <stop offset="100%" stop-color="#9a3412"/>
        </radialGradient>
        <linearGradient id="bnlx-coin-edge" x1="32" y1="48" x2="32" y2="56">
          <stop offset="0%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#713f12"/>
        </linearGradient>
        <radialGradient id="bnlx-shell" cx="40%" cy="28%" r="75%">
          <stop offset="0%" stop-color="#fecaca"/>
          <stop offset="35%" stop-color="#ef4444"/>
          <stop offset="85%" stop-color="#991b1b"/>
          <stop offset="100%" stop-color="#7f1d1d"/>
        </radialGradient>
        <linearGradient id="bnlx-shell-shine" x1="22" y1="22" x2="38" y2="40">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="bnlx-eye" cx="35%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#e2e8f0"/>
        </radialGradient>
        <linearGradient id="bnlx-star" x1="46" y1="10" x2="56" y2="22">
          <stop offset="0%" stop-color="#fef08a"/>
          <stop offset="50%" stop-color="#facc15"/>
          <stop offset="100%" stop-color="#ca8a04"/>
        </linearGradient>
        <linearGradient id="bnlx-ribbon" x1="48" y1="20" x2="54" y2="25">
          <stop offset="0%" stop-color="#e11d48"/>
          <stop offset="100%" stop-color="#9f1239"/>
        </linearGradient>
        <filter id="bnlx-soft" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="0.8" result="b"/>
          <feOffset dx="0" dy="0.6" in="b" result="o"/>
          <feComponentTransfer in="o" result="a">
            <feFuncA type="linear" slope="0.35"/>
          </feComponentTransfer>
          <feMerge>
            <feMergeNode in="a"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
  </defs>
  <rect width="1500" height="500" fill="url(#bg)"/>
  <!-- Hub logo (left) -->
  <g transform="translate(120, 125) scale(3.9)">
    <rect width="64" height="64" rx="14" fill="url(#bnlx-bg)"/>

      <!-- Ground glow -->
      <ellipse cx="32" cy="53" rx="18" ry="4.5" fill="#000000" opacity="0.22"/>

      <!-- Reward coin (stacked rim + face) -->
      <ellipse cx="32" cy="51.35" rx="12.55" ry="2.35" fill="#5c2d0a" opacity="0.55"/>
      <ellipse cx="32" cy="50.5" rx="13.2" ry="4.2" fill="url(#bnlx-coin-edge)" opacity="0.95"/>
      <ellipse cx="32" cy="48.2" rx="13.5" ry="13.5" fill="url(#bnlx-coin)"/>
      <ellipse cx="32" cy="48.2" rx="13.5" ry="13.5" fill="none" stroke="#78350f" stroke-width="0.55" opacity="0.35"/>
      <ellipse cx="32" cy="48.2" rx="13.15" ry="13.15" fill="none" stroke="#fcd34d" stroke-width="0.28" opacity="0.55"/>
      <ellipse cx="27.5" cy="43.5" rx="5" ry="4" fill="#ffffff" opacity="0.2"/>
      <circle cx="32" cy="48.2" r="5.4" fill="none" stroke="#92400e" stroke-width="0.45" opacity="0.4"/>
      <!-- Embossed reward mark (no text/fonts for crisp exports) -->
      <path
        d="M32 44.35l.72 2.06 2.18.04-1.74 1.27.66 2.08L32 48.9l-1.84 1.1.66-2.08-1.74-1.27 2.18-.04.72-2.06z"
        fill="#78350f"
        opacity="0.42"
      />
      <path
        d="M32 44.65l.52 1.48 1.56.03-1.25.92.47 1.48L32 48.35l-1.32.78.47-1.48-1.25-.92 1.56-.03.52-1.48z"
        fill="#fff7ed"
        opacity="0.22"
      />

      <!-- Cartoon bug body (simplified realistic shading) -->
      <g filter="url(#bnlx-soft)">
        <!-- Elytra -->
        <ellipse cx="32" cy="35.2" rx="11.2" ry="9.6" fill="url(#bnlx-shell)"/>
        <path d="M32 25.8v18.8" stroke="#450a0a" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
        <!-- Specular -->
        <ellipse cx="27.2" cy="30.5" rx="5.5" ry="7" fill="url(#bnlx-shell-shine)" opacity="0.45"/>
        <!-- Spots -->
        <circle cx="25.2" cy="34.5" r="2.35" fill="#1c1917" opacity="0.88"/>
        <circle cx="38.8" cy="34.5" r="2.35" fill="#1c1917" opacity="0.88"/>
        <circle cx="23.5" cy="39.8" r="1.55" fill="#1c1917" opacity="0.82"/>
        <circle cx="40.5" cy="39.8" r="1.55" fill="#1c1917" opacity="0.82"/>
        <!-- Head -->
        <ellipse cx="32" cy="24.6" rx="7.1" ry="5.4" fill="#0f172a"/>
        <ellipse cx="32" cy="23.9" rx="6.3" ry="4.7" fill="#1e293b"/>
        <!-- Eyes -->
        <ellipse cx="28.6" cy="23.6" rx="2.45" ry="2.85" fill="url(#bnlx-eye)"/>
        <ellipse cx="35.4" cy="23.6" rx="2.45" ry="2.85" fill="url(#bnlx-eye)"/>
        <circle cx="29.1" cy="23.9" r="1.35" fill="#0f172a"/>
        <circle cx="35.9" cy="23.9" r="1.35" fill="#0f172a"/>
        <circle cx="29.55" cy="23.45" r="0.45" fill="#ffffff" opacity="0.95"/>
        <circle cx="36.35" cy="23.45" r="0.45" fill="#ffffff" opacity="0.95"/>
        <!-- Smile -->
        <path d="M29.2 26.4c1.2 1.05 4.6 1.05 5.6 0" fill="none" stroke="#64748b" stroke-width="0.65" stroke-linecap="round" opacity="0.9"/>
        <!-- Antennae -->
        <path d="M26.8 20.6c-1.9-2.1-3.6-2.5-5.1-2.2M37.2 20.6c1.9-2.1 3.6-2.5 5.1-2.2" stroke="#0f172a" stroke-width="0.75" stroke-linecap="round"/>
        <circle cx="21.4" cy="18.2" r="1.05" fill="#1e293b"/>
        <circle cx="42.6" cy="18.2" r="1.05" fill="#1e293b"/>
        <!-- Tiny legs -->
        <path d="M23.5 41.2l-2.6 3.1M40.5 41.2l2.6 3.1M27.5 42.6l-1.2 3.5M36.5 42.6l1.2 3.5" stroke="#450a0a" stroke-width="0.7" stroke-linecap="round" opacity="0.65"/>
      </g>

      <!-- Reward spark + star -->
      <path d="M12.5 18.5l1.1 2.2 2.4.35-1.75 1.7.45 2.45-2.2-1.15-2.2 1.15.45-2.45-1.75-1.7 2.4-.35 1.1-2.2z" fill="#fde047" opacity="0.9"/>
      <path
        d="M50.5 12.2l1.35 3.05 3.35.3-2.55 2.2 0.8 3.3-3.05-1.85-3.05 1.85 0.8-3.3-2.55-2.2 3.35-.3 1.35-3.05z"
        fill="url(#bnlx-star)"
      />
      <path
        d="M50.5 12.2l1.35 3.05 3.35.3-2.55 2.2 0.8 3.3-3.05-1.85-3.05 1.85 0.8-3.3-2.55-2.2 3.35-.3 1.35-3.05z"
        fill="none"
        stroke="#a16207"
        stroke-width="0.35"
        opacity="0.45"
      />
      <!-- Tiny ribbon under star -->
      <path d="M48.35 20.05h4.3l.55 1.15h-5.4l.55-1.15z" fill="url(#bnlx-ribbon)"/>
      <path
        d="M48.35 21.2l-1 2.45 1.4-.62.48-1.08zM52.65 21.2l1 2.45-1.4-.62-.48-1.08z"
        fill="url(#bnlx-ribbon)"
      />
      <path
        d="M48.35 20.05h4.3l.55 1.15h-5.4l.55-1.15z"
        fill="none"
        stroke="#881337"
        stroke-width="0.22"
        opacity="0.65"
      />
      <path
        d="M48.35 21.2l-1 2.45 1.4-.62.48-1.08zM52.65 21.2l1 2.45-1.4-.62-.48-1.08z"
        fill="none"
        stroke="#881337"
        stroke-width="0.2"
        opacity="0.55"
      />
      <path d="M49.85 20.05v1.15M51.15 20.05v1.15" stroke="#fde047" stroke-width="0.28" stroke-linecap="round" opacity="0.55"/>
  </g>
  <!-- Title + tagline -->
  <text x="420" y="220" fill="#fffef0" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700">BountyHub</text>
  <text x="420" y="280" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="22">Decentralized Bounty Platform · Solana</text>
  <text x="420" y="340" fill="#facc15" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600">Build in public · Decentralized bounty platform</text>
  <!-- Use-case pills (gold / rose / amber from logo icon) -->
  <rect x="420" y="370" width="140" height="36" rx="18" fill="rgba(250,204,21,0.14)" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="490" y="394" fill="#fef08a" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Q&amp;A Bounties</text>
  <rect x="580" y="370" width="160" height="36" rx="18" fill="rgba(239,68,68,0.12)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="660" y="394" fill="#fecaca" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Bug Bounties</text>
  <rect x="760" y="370" width="120" height="36" rx="18" fill="rgba(251,191,36,0.14)" stroke="#d97706" stroke-width="1.5"/>
  <text x="820" y="394" fill="#fde68a" font-family="system-ui, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Developer Hub</text>
</svg>
